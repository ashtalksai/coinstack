<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Stacked coins mark: 3 coins, bottom to top -->
  <!-- Coin 3 (bottom) -->
  <ellipse cx="20" cy="38" rx="12" ry="5" fill="#A07810" opacity="0.9"/>
  <rect x="8" y="32" width="24" height="6" rx="0" fill="#A07810" opacity="0.9"/>
  <ellipse cx="20" cy="32" rx="12" ry="5" fill="#C49214"/>
  <!-- Coin 2 (middle) -->
  <ellipse cx="20" cy="28" rx="12" ry="5" fill="#B08012" opacity="0.9"/>
  <rect x="8" y="22" width="24" height="6" rx="0" fill="#B08012" opacity="0.9"/>
  <ellipse cx="20" cy="22" rx="12" ry="5" fill="#D4A017"/>
  <!-- Coin 1 (top) -->
  <ellipse cx="20" cy="18" rx="12" ry="5" fill="#C49214" opacity="0.95"/>
  <rect x="8" y="12" width="24" height="6" rx="0" fill="#C49214" opacity="0.95"/>
  <ellipse cx="20" cy="12" rx="12" ry="5" fill="#E8B820"/>
  <!-- $ symbol on top coin -->
  <text x="20" y="16.5" text-anchor="middle" font-family="Georgia, serif" font-size="8" font-weight="700" fill="#1B4332" opacity="0.85">$</text>
  <!-- Wordmark (white for dark backgrounds) -->
  <text x="44" y="32" font-family="'Cabinet Grotesk', 'Arial Black', sans-serif" font-size="26" font-weight="800" fill="#FAFAF7" letter-spacing="-0.5">Coinstack</text>
</svg>
